<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PADAP Intelligence — Compras & Precificação</title>
    <style>
      :root{--bg:#071112;--panel:rgba(8,24,23,.78);--line:rgba(255,255,255,.1);--green:#39d353;--mint:#9cffb1;--cyan:#42d7ff;--amber:#f6b73c;--red:#ef4444;--text:#f8fafc;--muted:#94a3b8}
      *{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at 18% 0,rgba(57,211,83,.18),transparent 34%),radial-gradient(circle at 84% 12%,rgba(66,215,255,.12),transparent 30%),linear-gradient(135deg,#061617,#09241f 48%,#071015);color:var(--text)}
      button,input,select{font:inherit}.app{min-height:100vh;display:flex}.sidebar{width:280px;min-height:100vh;border-right:1px solid var(--line);background:rgba(5,15,16,.82);backdrop-filter:blur(18px);padding:18px;position:sticky;top:0}.brand{display:flex;align-items:center;gap:12px;margin-bottom:24px}.mark{width:42px;height:42px;border-radius:9px;border:1px solid rgba(57,211,83,.45);display:grid;place-items:center;color:var(--mint);font-weight:900;background:rgba(57,211,83,.1);box-shadow:0 0 32px rgba(57,211,83,.16)}.brand strong{letter-spacing:.22em}.brand span{display:block;color:var(--green);font-size:10px;letter-spacing:.2em;text-transform:uppercase}
      nav{display:grid;gap:6px}.nav{border:0;width:100%;text-align:left;color:#cbd5e1;background:transparent;border-radius:9px;padding:12px 13px;cursor:pointer}.nav.active,.nav:hover{background:rgba(57,211,83,.13);color:var(--mint)}
      main{flex:1;min-width:0}.top{height:66px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:rgba(6,17,18,.72);backdrop-filter:blur(16px);position:sticky;top:0;z-index:2}.search{width:min(440px,42vw);border:1px solid var(--line);border-radius:9px;background:rgba(255,255,255,.04);color:#64748b;padding:11px 14px}.user{display:flex;align-items:center;gap:10px}.badge{border:1px solid var(--line);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:700}.green{border-color:rgba(57,211,83,.35);background:rgba(57,211,83,.1);color:var(--mint)}.cyan{border-color:rgba(66,215,255,.35);background:rgba(66,215,255,.1);color:#c7f5ff}.amber{border-color:rgba(246,183,60,.35);background:rgba(246,183,60,.1);color:#fde68a}.red{border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.1);color:#fecaca}
      .content{max-width:1360px;margin:0 auto;padding:30px}.title{margin-bottom:24px}.title h1{margin:0;font-size:32px;line-height:1.15}.title p{color:var(--muted);line-height:1.65;max-width:820px}.grid{display:grid;gap:16px}.kpis{grid-template-columns:repeat(4,minmax(0,1fr))}.two{grid-template-columns:1.25fr .75fr}.three{grid-template-columns:repeat(3,minmax(0,1fr))}.card{border:1px solid var(--line);background:var(--panel);backdrop-filter:blur(18px);border-radius:10px;padding:20px;box-shadow:0 24px 80px rgba(0,0,0,.28)}.kpi small,.metric small{display:block;color:var(--muted);font-size:13px}.kpi strong{display:block;margin-top:12px;font-size:25px}.metric strong{display:block;margin-top:6px;font-size:18px}.btn{border:0;border-radius:9px;background:var(--green);color:#061112;font-weight:800;padding:11px 15px;cursor:pointer}.btn.ghost{border:1px solid var(--line);background:rgba(255,255,255,.05);color:white}.btn.amber{border:1px solid rgba(246,183,60,.35);background:rgba(246,183,60,.14);color:#fde68a}.btn.red{border:1px solid rgba(239,68,68,.35);background:rgba(239,68,68,.12);color:#fecaca}
      table{width:100%;border-collapse:collapse;min-width:760px}th,td{border-bottom:1px solid var(--line);padding:13px;text-align:left;white-space:nowrap}th{font-size:12px;text-transform:uppercase;color:#64748b}td{color:#dbe4ee}.tablewrap{overflow:auto;border:1px solid var(--line);border-radius:10px}.bars{display:grid;gap:11px}.barrow{display:grid;grid-template-columns:120px 1fr 50px;gap:10px;align-items:center;color:#dbe4ee;font-size:13px}.bar{height:10px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden}.bar i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--green),var(--cyan))}.action{display:grid;gap:12px}.action h3{margin:0}.action p{margin:0;color:var(--muted);line-height:1.55}.whats{white-space:pre-wrap;background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:10px;padding:16px;color:#dbe4ee;line-height:1.55}.login{min-height:100vh;display:grid;place-items:center;padding:18px}.login .card{max-width:460px;width:100%}.field{display:grid;gap:7px;margin:14px 0}.field input{border:1px solid var(--line);background:rgba(0,0,0,.22);color:white;border-radius:9px;padding:12px}.hidden{display:none}
      @media(max-width:1000px){.sidebar{width:82px}.sidebar .brand div:last-child,.sidebar .nav span{display:none}.kpis,.three,.two{grid-template-columns:1fr}.content{padding:20px}.search{display:none}}
    </style>
  </head>
  <body>
    <section id="login" class="login">
      <div class="card">
        <div class="brand" style="justify-content:center"><div class="mark">P</div><div><strong>PADAP</strong><span>Intelligence</span></div></div>
        <div class="title" style="text-align:center"><h1>Compras & Precificação</h1><p>Acesse sua conta para acompanhar cotações, propostas, pacotes e inteligência de mercado.</p></div>
        <div class="field"><label>E-mail</label><input id="email" value="admin@padap.com.br"></div>
        <div class="field"><label>Senha</label><input id="password" type="password" value="admin123"></div>
        <button class="btn" style="width:100%" onclick="enter()">Entrar</button>
        <p style="text-align:center;color:var(--mint)">Esqueci minha senha</p>
      </div>
    </section>
    <section id="app" class="app hidden">
      <aside class="sidebar">
        <div class="brand"><div class="mark">P</div><div><strong>PADAP</strong><span>Intelligence</span></div></div>
        <nav id="nav"></nav>
      </aside>
      <main>
        <header class="top"><div class="search">Buscar cliente, produto, proposta...</div><div class="user"><span class="badge cyan">Administrador Geral</span><button class="btn ghost" onclick="logout()">Sair</button></div></header>
        <div class="content" id="content"></div>
      </main>
    </section>
    <script>
      const products=[['YB-1020','YaraBasa 10-20-20','Yara','Big bag',3980,'Disponível'],['YM-0830','YaraMila 08-30-10','Yara','Saco 50 kg',4490,'Disponível'],['YV-CAL','YaraVita Caltrac','Yara','Galão 10 L',2140,'Disponível'],['MAP-1160','MAP 11-60','Sibra','Big bag',5110,'Indisponível']];
      const proposals=[['PR-1024','Grupo Santa Clara','YaraBasa 10-20-20','48 Tonelada','R$ 4.080,00','Reconfirmar por alteração cambial'],['PR-1025','Agro Vale Verde','YaraMila 08-30-10','32 Tonelada','R$ 4.680,00','Aprovado'],['PR-1026','Diamante Agro','YaraVita Caltrac','18 Galão','R$ 2.140,00','Aprovado']];
      const pages=['Cockpit','Inteligência de Mercado','Tabela da Semana','Propostas','Pacotes','Aprovações','Clientes','Consultores','Relatórios','Usuários','Configurações'];
      const brl=v=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v);
      function enter(){localStorage.setItem('padap.preview.session','1');document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');renderNav();show('Cockpit')}
      function logout(){localStorage.removeItem('padap.preview.session');location.reload()}
      function renderNav(){nav.innerHTML=pages.map((p,i)=>`<button class="nav ${i==0?'active':''}" onclick="show('${p}',this)"><span>${p}</span></button>`).join('')}
      function setTitle(h,p){return `<div class="title"><h1>${h}</h1><p>${p}</p></div>`}
      function kpis(){return `<div class="grid kpis"><div class="card kpi"><small>Propostas vencendo hoje</small><strong>4</strong></div><div class="card kpi"><small>Aprovações pendentes</small><strong>1</strong></div><div class="card kpi"><small>Volume em negociação</small><strong>${brl(621080)}</strong></div><div class="card kpi"><small>Margem média</small><strong>10,84%</strong></div></div>`}
      function table(headers,rows){return `<div class="tablewrap"><table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
      function action(problem){return `<div class="card action"><span class="badge amber">Ação Recomendada</span><h3>${problem}</h3><p>Por que importa: pode reduzir margem, atrasar aprovação ou gerar cotação vencida.</p><p>O que fazer agora: revisar, recalcular e registrar decisão antes do envio.</p><button class="btn">Executar ação</button></div>`}
      function bars(){return `<div class="card"><h2>Pulso de mercado</h2><div class="bars">${['PTAX','Ureia','MAP','KCl','Café'].map((x,i)=>`<div class="barrow"><span>${x}</span><div class="bar"><i style="width:${55+i*8}%"></i></div><b>${i==3?'-1,8%':'+ '+(i+1)+',1%'}</b></div>`).join('')}</div></div>`}
      function whats(){return `<div class="whats">Olá, Lucas Almeida.\n\nSegue cotação para o cliente Grupo Santa Clara:\n\nProduto: YaraBasa 10-20-20\nQuantidade: 48 Tonelada\nPreço: R$ 4.080,00/Tonelada\nPrazo: Mês 11\nFrete: CIF\nValidade: hoje, 18:00\n\nObservação:\nPreço sujeito à disponibilidade e confirmação no momento do pedido.</div>`}
      function show(page,btn){document.querySelectorAll('.nav').forEach(b=>b.classList.remove('active')); if(btn)btn.classList.add('active'); const c=document.getElementById('content');
        if(page==='Cockpit') c.innerHTML=setTitle('Bom dia, Mariana PADAP. Existem 6 ações comerciais que precisam da sua atenção hoje.','Central de decisão diária para compras, precificação, aprovações e inteligência de mercado.')+kpis()+`<div class="grid two" style="margin-top:16px">${bars()}${action('PTAX subiu desde a última cotação.')}</div>`;
        else if(page==='Inteligência de Mercado') c.innerHTML=setTitle('Inteligência de Mercado','PTAX, fertilizantes, fretes, culturas, notícias mockadas e recomendações do Analista de Mercado.')+`<div class="grid three">${bars()}${action('KCl em queda abre janela de compra.')}${action('Ureia em alta exige atenção em nitrogenados.')}</div>`;
        else if(page==='Tabela da Semana') c.innerHTML=setTitle('Tabela da Semana — Yara','Importação e conferência obrigatória da planilha semanal, usando sempre Preço Final como base de venda.')+`<div class="card"><span class="badge green">Tabela ativa</span><p>Fornecedor: Yara | PTAX 5,18 | Produtos encontrados: 6 | Produtos válidos: 5</p><button class="btn">Importar Planilha</button> <button class="btn ghost">Ver Erros</button></div><br>`+table(['Código','Descrição','Fornecedor','Embalagem','Preço Final','Status'],products.map(p=>[p[0],p[1],p[2],p[3],brl(p[4]),p[5]]));
        else if(page==='Propostas') c.innerHTML=setTitle('Central de Propostas','Criação, análise de margem, status comercial e mensagem limpa para WhatsApp.')+`<div class="grid two"><div>${table(['ID','Cliente','Produto','Qtd','Venda','Status'],proposals)}<br>${action('Cotação com PTAX diferente do atual.')}</div><div class="card"><h2>Mensagem para WhatsApp</h2>${whats()}<br><button class="btn">Copiar mensagem</button> <button class="btn ghost">Abrir WhatsApp</button></div></div>`;
        else if(page==='Pacotes') c.innerHTML=setTitle('Montador de Pacote Comercial','Compensação de margem entre itens com meta PADAP de 10% no pacote total.')+kpis()+`<br>${table(['Produto','Qtd','Custo unit.','Venda unit.','Margem'],[['YaraBasa 10-20-20','36 t','R$ 3.754,00','R$ 4.145,00','9,43%'],['KCl Granulado','18 t','R$ 2.795,00','R$ 3.045,00','8,21%'],['YaraVita Caltrac','10 galões','R$ 1.668,00','R$ 2.220,00','24,86%']])}`;
        else if(page==='Aprovações') c.innerHTML=setTitle('Central de Aprovações','Registro formal de motivos, decisões, usuário, data, hora e justificativa.')+table(['ID','Cliente','Valor','Margem','Motivo','Decisão'],[['AP-501','Grupo Santa Clara','R$ 195.840,00','8,90%','Margem abaixo da meta e PTAX alterado','Pendente']])+`<br><div class="card"><button class="btn">Aprovar</button> <button class="btn red">Reprovar</button> <button class="btn amber">Ajustar preço</button></div>`;
        else c.innerHTML=setTitle(page, 'Módulo do protótipo PADAP Intelligence — Compras & Precificação com dados mockados, filtros e ações simuladas.')+kpis()+`<br>${action('Revisar indicadores e manter dados atualizados.')}`;
      }
      if(localStorage.getItem('padap.preview.session')) enter();
    </script>
  </body>
</html>

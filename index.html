<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PADAP · Notícias do Mercado de Fertilizantes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --white:#FFFFFF;
    --dark-green:#123B32;
    --black:#161616;
    --accent:#2FAE0F;
    --accent-dark:#1F8A0A;
    --gray:#E8ECE9;
    --gray-text:#6B7570;
    --radius:14px;
    --max-w:1180px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--white);
    color:var(--black);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{
    font-family:'Sora',system-ui,sans-serif;
  }
  a{color:inherit;}

  /* ---------- Header ---------- */
  header{
    border-bottom:1px solid var(--gray);
    position:sticky;
    top:0;
    background:rgba(255,255,255,0.92);
    backdrop-filter:blur(8px);
    z-index:50;
  }
  .header-inner{
    max-width:var(--max-w);
    margin:0 auto;
    padding:18px 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .brand img{
    height:40px;
    width:auto;
    display:block;
  }
  .brand-text .name{
    font-weight:800;
    font-size:19px;
    color:var(--dark-green);
    letter-spacing:0.02em;
    line-height:1.1;
  }
  .brand-text .tagline{
    font-size:12px;
    color:var(--gray-text);
    font-weight:500;
    letter-spacing:0.03em;
    margin-top:2px;
  }
  .header-status{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .live-pill{
    display:flex;
    align-items:center;
    gap:7px;
    font-size:12.5px;
    font-weight:600;
    color:var(--dark-green);
    background:var(--gray);
    padding:6px 12px 6px 10px;
    border-radius:999px;
  }
  .live-dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 0 0 rgba(47,174,15,0.6);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(47,174,15,0.45);}
    70%{box-shadow:0 0 0 7px rgba(47,174,15,0);}
    100%{box-shadow:0 0 0 0 rgba(47,174,15,0);}
  }
  #updated-text{color:var(--gray-text); font-weight:500;}
  .refresh-btn{
    display:flex;
    align-items:center;
    gap:7px;
    background:var(--dark-green);
    color:var(--white);
    border:none;
    border-radius:999px;
    padding:9px 16px;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:13px;
    cursor:pointer;
    transition:background 0.15s ease, transform 0.1s ease;
  }
  .refresh-btn:hover{background:var(--accent-dark);}
  .refresh-btn:active{transform:scale(0.97);}
  .refresh-btn svg{transition:transform 0.5s ease;}
  .refresh-btn.spinning svg{animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ---------- Filters ---------- */
  .filters{
    max-width:var(--max-w);
    margin:0 auto;
    padding:18px 24px 4px;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .chip{
    border:1px solid var(--gray);
    background:var(--white);
    color:var(--dark-green);
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:13px;
    padding:8px 14px;
    border-radius:999px;
    cursor:pointer;
    transition:all 0.15s ease;
    white-space:nowrap;
  }
  .chip:hover{border-color:var(--accent);}
  .chip.active{
    background:var(--dark-green);
    border-color:var(--dark-green);
    color:var(--white);
  }

  /* ---------- Main / Grid ---------- */
  main{
    max-width:var(--max-w);
    margin:0 auto;
    padding:20px 24px 80px;
  }
  .section-label{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin:10px 2px 16px;
  }
  .section-label h1{
    font-size:15px;
    font-weight:700;
    color:var(--gray-text);
    text-transform:uppercase;
    letter-spacing:0.08em;
    margin:0;
  }
  .count-text{font-size:12.5px;color:var(--gray-text);}

  .grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:18px;
  }
  @media (max-width:920px){ .grid{grid-template-columns:repeat(2,1fr);} }
  @media (max-width:640px){ .grid{grid-template-columns:1fr;} }

  .card{
    border:1px solid var(--gray);
    border-radius:var(--radius);
    padding:0;
    background:var(--white);
    text-decoration:none;
    color:inherit;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    transition:box-shadow 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
  }
  .card:hover{
    box-shadow:0 10px 28px -12px rgba(18,59,50,0.28);
    transform:translateY(-3px);
    border-color:#d3dcd7;
  }
  .card-bar{height:4px; background:var(--accent);}
  .card-body{padding:18px 18px 16px; display:flex; flex-direction:column; gap:10px; flex:1;}
  .tag-row{display:flex; align-items:center; justify-content:space-between;}
  .tag{
    font-size:11px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--accent-dark);
    background:rgba(47,174,15,0.1);
    padding:4px 9px;
    border-radius:6px;
  }
  .time-ago{font-size:11.5px; color:var(--gray-text); font-weight:500;}
  .headline{
    font-family:'Sora',sans-serif;
    font-weight:700;
    font-size:16.5px;
    line-height:1.35;
    color:var(--black);
    margin:0;
  }
  .excerpt{
    font-size:13px;
    line-height:1.55;
    color:var(--gray-text);
    margin:0;
    display:-webkit-box;
    -webkit-line-clamp:3;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .card-footer{
    margin-top:auto;
    padding-top:10px;
    border-top:1px solid var(--gray);
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .source{
    font-size:12.5px;
    font-weight:600;
    color:var(--dark-green);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .source svg{flex-shrink:0;}

  /* ---------- Skeleton ---------- */
  .skeleton .card-bar{background:var(--gray);}
  .skel-line{
    height:12px;
    border-radius:5px;
    background:linear-gradient(90deg, var(--gray) 25%, #f3f5f3 50%, var(--gray) 75%);
    background-size:200% 100%;
    animation:shimmer 1.4s infinite;
  }
  @keyframes shimmer{0%{background-position:200% 0;} 100%{background-position:-200% 0;}}

  /* ---------- Empty / error state ---------- */
  .state-box{
    grid-column:1 / -1;
    text-align:center;
    padding:70px 20px;
    color:var(--gray-text);
  }
  .state-box h2{
    color:var(--dark-green);
    font-size:18px;
    margin:14px 0 6px;
  }
  .state-box p{font-size:13.5px; max-width:420px; margin:0 auto 18px; line-height:1.6;}
  .retry-btn{
    background:var(--white);
    border:1.5px solid var(--dark-green);
    color:var(--dark-green);
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:13px;
    padding:9px 18px;
    border-radius:999px;
    cursor:pointer;
  }
  .retry-btn:hover{background:var(--gray);}

  footer{
    border-top:1px solid var(--gray);
    padding:22px 24px;
    text-align:center;
    font-size:12px;
    color:var(--gray-text);
  }
</style>
</head>

<script>
const CATEGORIES = ['Todas', 'Mercado', 'Ureia', 'Fosfatados', 'Potássio', 'Comércio Exterior', 'Câmbio', 'Geopolítica', 'Logística'];

let allItems = [];
let activeFilter = 'Todas';
let refreshTimer = null;

function buildFilters(){
  const box = document.getElementById('filters');
  box.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (cat === activeFilter ? ' active' : '');
    chip.textContent = cat;
    chip.onclick = () => { activeFilter = cat; buildFilters(); renderGrid(); };
    box.appendChild(chip);
  });
}

function skeletons(n=9){
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for(let i=0;i<n;i++){
    const c = document.createElement('div');
    c.className = 'card skeleton';

      <div class="card-body">
        <div class="skel-line" style="width:40%"></div>
        <div class="skel-line" style="width:95%;height:16px;margin-top:6px;"></div>
        <div class="skel-line" style="width:80%;height:16px;"></div>
        <div class="skel-line" style="width:100%;margin-top:6px;"></div>
        <div class="skel-line" style="width:60%"></div>
      </div>`;
    grid.appendChild(c);
  }
}

function timeAgo(dateStr){
  const d = new Date(dateStr);
  if(isNaN(d)) return '';
  const diffMs = Date.now() - d.getTime();
  const min = Math.floor(diffMs/60000);
  if(min < 1) return 'agora';
  if(min < 60) return `há ${min} min`;
  const h = Math.floor(min/60);
  if(h < 24) return `há ${h}h`;
  const days = Math.floor(h/24);
  if(days === 1) return 'há 1 dia';
  return `há ${days} dias`;
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function renderGrid(){
  const grid = document.getElementById('grid');
  const countText = document.getElementById('count-text');
  const items = activeFilter === 'Todas' ? allItems : allItems.filter(i => i.cat === activeFilter);

  if(items.length === 0){
    grid.innerHTML = `
      <div class="state-box">
        <h2>Nenhuma notícia encontrada</h2>
        <p>Não há resultados para este filtro no momento. Tente outra categoria ou atualize novamente.</p>
      </div>`;
    countText.textContent = '';
    return;
  }

  countText.textContent = `${items.length} notícia${items.length===1?'':'s'}`;
  grid.innerHTML = '';
  items.forEach(item => {
    const a = document.createElement('a');
    a.className = 'card';
    a.href = item.link;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.innerHTML = `
      <div class="card-bar"></div>
      <div class="card-body">
        <div class="tag-row">
          <span class="tag">${escapeHtml(item.cat)}</span>
          <span class="time-ago">${timeAgo(item.pubDate)}</span>
        </div>
        <h3 class="headline">${escapeHtml(item.title)}</h3>
        <p class="excerpt">${escapeHtml(item.excerpt)}</p>
        <div class="card-footer">
          <span class="source">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14L21 3"/></svg>
            ${escapeHtml(item.source)}
          </span>
        </div>
      </div>`;
    grid.appendChild(a);
  });
}

async function loadNews(){
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  skeletons();

  try{
    const res = await fetch('/api/news?limit=300');
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'Falha ao buscar notícias');
    allItems = (data.items || []).map(it => ({
      title: it.title,
      link: it.link,
      pubDate: it.pub_date,
      excerpt: it.excerpt,
      source: it.source,
      cat: it.category,
    }));
  }catch(e){
    console.warn('Falha ao buscar notícias:', e);
    allItems = [];
  }

  btn.classList.remove('spinning');
  document.getElementById('updated-text').textContent =
    'Atualizado ' + new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});

  if(allItems.length === 0){
    document.getElementById('grid').innerHTML = `
      <div class="state-box">
        <h2>Não foi possível carregar as notícias</h2>
        <p>O serviço de notícias pode estar indisponível no momento. Verifique sua conexão e tente novamente.</p>
        <button class="retry-btn" id="retry-btn">Tentar novamente</button>
      </div>`;
    document.getElementById('count-text').textContent = '';
    document.getElementById('retry-btn').onclick = loadNews;
    return;
  }
  renderGrid();
}

document.getElementById('refresh-btn').addEventListener('click', loadNews);
buildFilters();
loadNews();

// atualiza a cada 15min enquanto a página ficar aberta (o cron de coleta roda 1x/dia)
refreshTimer = setInterval(loadNews, 15 * 60 * 1000);
</script>
